<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpinPlatform | Wheel Editor</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Inter:wght@300..700&amp;display=swap" rel="stylesheet"/>

<style>
        .glass-panel {
            background: rgba(27, 27, 35, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(74, 68, 85, 0.2);
        }
        .dot-grid {
            background-image: radial-gradient(rgba(124, 58, 237, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .ghost-border {
            border: 1px solid rgba(74, 68, 85, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-white">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top App Bar (Shared Logic: Excluded for Editor Process, using Minimal Back-to-Main Header) -->
<header class="flex items-center justify-between px-6 py-3 border-b border-outline-variant/20 bg-surface">
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 text-outline hover:text-white transition-colors group">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
<span class="font-label text-xs tracking-[0.08em] uppercase">Exit Editor</span>
</button>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<h1 class="font-display text-lg font-bold tracking-tight">Campaign: <span class="text-primary">Summer_Vibes_2024</span></h1>
</div>
<div class="flex items-center gap-3">
<button class="ghost-border px-4 py-2 rounded-lg bg-surface-container-low text-sm font-bold flex items-center gap-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-[18px]">visibility</span>
                    Preview
                </button>
<button class="bg-gradient-to-br from-primary-container to-secondary-container px-6 py-2 rounded-lg text-white text-sm font-bold shadow-[0_0_15px_rgba(124,58,237,0.3)] hover:shadow-[0_0_25px_rgba(124,58,237,0.5)] transition-all">
                    Publish Changes
                </button>
</div>
</header>
<main class="flex flex-1 overflow-hidden">
<!-- Left Panel: Controls -->
<aside class="w-[420px] h-full flex flex-col bg-surface-container-lowest border-r border-outline-variant/20 z-10 shadow-2xl">
<!-- Navigation Tabs -->
<nav class="flex border-b border-outline-variant/10 px-6 gap-6 overflow-x-auto scrollbar-hide">
<button class="flex flex-col items-center justify-center border-b-2 border-primary text-primary pb-3 pt-4 transition-all">
<span class="font-label text-[10px] tracking-[0.1em] uppercase font-bold">Design</span>
</button>
<button class="flex flex-col items-center justify-center border-b-2 border-transparent text-outline pb-3 pt-4 hover:text-white transition-all">
<span class="font-label text-[10px] tracking-[0.1em] uppercase font-bold">Segments</span>
</button>
<button class="flex flex-col items-center justify-center border-b-2 border-transparent text-outline pb-3 pt-4 hover:text-white transition-all">
<span class="font-label text-[10px] tracking-[0.1em] uppercase font-bold">Form</span>
</button>
<button class="flex flex-col items-center justify-center border-b-2 border-transparent text-outline pb-3 pt-4 hover:text-white transition-all">
<span class="font-label text-[10px] tracking-[0.1em] uppercase font-bold">Settings</span>
</button>
</nav>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto p-6 space-y-8">
<!-- Section: Wheel Geometry -->
<section>
<h3 class="font-display text-sm font-bold uppercase tracking-widest text-primary/80 mb-6">Wheel Geometry</h3>
<div class="space-y-6">
<!-- Slider Control -->
<div class="group">
<div class="flex justify-between items-center mb-3">
<label class="font-label text-xs uppercase tracking-[0.08em] text-outline group-hover:text-primary transition-colors">Outer Diameter</label>
<span class="font-mono text-xs text-white bg-surface-container px-2 py-1 rounded">820px</span>
</div>
<input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" type="range" value="80"/>
</div>
<!-- Slider Control -->
<div class="group">
<div class="flex justify-between items-center mb-3">
<label class="font-label text-xs uppercase tracking-[0.08em] text-outline group-hover:text-primary transition-colors">Inner Radius (Donut)</label>
<span class="font-mono text-xs text-white bg-surface-container px-2 py-1 rounded">15%</span>
</div>
<input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" type="range" value="15"/>
</div>
</div>
</section>
<!-- Section: Visual Aesthetics -->
<section>
<h3 class="font-display text-sm font-bold uppercase tracking-widest text-primary/80 mb-6">Visual Aesthetics</h3>
<div class="space-y-6">
<!-- Hex Picker Input -->
<div class="space-y-3">
<label class="font-label text-xs uppercase tracking-[0.08em] text-outline">Accent Color 01</label>
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-primary shadow-inner border border-white/10"></div>
<div class="flex-1 relative">
<input class="w-full bg-surface-container border-none rounded-lg text-sm font-mono focus:ring-1 focus:ring-primary h-10 px-4" type="text" value="#D2BBFF"/>
</div>
</div>
</div>
<!-- Toggles -->
<div class="flex items-center justify-between p-4 rounded-xl bg-surface-container-low ghost-border">
<div>
<p class="text-sm font-bold text-on-background">Glow Effects</p>
<p class="text-[10px] text-outline uppercase tracking-wider">Rim lighting &amp; shadows</p>
</div>
<button class="relative inline-flex h-6 w-11 items-center rounded-full bg-primary-container">
<span class="inline-block h-4 w-4 transform rounded-full bg-white transition translate-x-6"></span>
</button>
</div>
<div class="flex items-center justify-between p-4 rounded-xl bg-surface-container-low ghost-border">
<div>
<p class="text-sm font-bold text-on-background">Center Branding</p>
<p class="text-[10px] text-outline uppercase tracking-wider">Logo or custom text</p>
</div>
<button class="relative inline-flex h-6 w-11 items-center rounded-full bg-surface-container-highest">
<span class="inline-block h-4 w-4 transform rounded-full bg-white transition translate-x-1"></span>
</button>
</div>
</div>
</section>
<!-- Section: Animation Profile -->
<section>
<h3 class="font-display text-sm font-bold uppercase tracking-widest text-primary/80 mb-6">Spin Physics</h3>
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center p-4 rounded-xl glass-panel border border-primary/40 text-primary">
<span class="material-symbols-outlined mb-2" data-icon="speed">speed</span>
<span class="text-[10px] uppercase font-bold tracking-widest">Momentum</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low text-outline hover:text-white transition-colors">
<span class="material-symbols-outlined mb-2" data-icon="rebase_edit">rebase_edit</span>
<span class="text-[10px] uppercase font-bold tracking-widest">Elastic</span>
</button>
</div>
</section>
</div>
<!-- Footer Stats -->
<div class="p-4 border-t border-outline-variant/10 bg-surface-container-lowest">
<div class="flex items-center gap-2 text-tertiary">
<span class="size-2 rounded-full bg-tertiary animate-pulse"></span>
<span class="text-[10px] font-label uppercase tracking-widest">Live Sync Active</span>
</div>
</div>
</aside>
<!-- Center Panel: Live Preview -->
<section class="flex-1 relative flex items-center justify-center dot-grid overflow-hidden">
<!-- Background Gradient Leaks -->
<div class="absolute -top-[20%] -right-[10%] size-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[20%] -left-[10%] size-[600px] bg-secondary/5 rounded-full blur-[120px]"></div>
<!-- Live Preview Workspace -->
<div class="relative w-full h-full max-w-4xl max-h-4xl flex items-center justify-center">
<!-- Toolbar Floating -->
<div class="absolute top-8 left-1/2 -translate-x-1/2 glass-panel px-4 py-2 rounded-full flex items-center gap-4 z-20">
<button class="text-outline hover:text-white transition-colors"><span class="material-symbols-outlined text-xl">zoom_in</span></button>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<span class="text-xs font-mono text-outline">100% Zoom</span>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<button class="text-outline hover:text-white transition-colors"><span class="material-symbols-outlined text-xl">screen_rotation</span></button>
</div>
<!-- The Wheel (Visual representation) -->
<div class="relative size-[500px] rounded-full p-2 bg-surface-container-highest shadow-[0_0_80px_rgba(124,58,237,0.2)]">
<!-- Outer Rim Glow -->
<div class="absolute inset-0 rounded-full border-2 border-primary/20 animate-pulse"></div>
<!-- Wheel Body -->
<div class="w-full h-full rounded-full border-8 border-surface-container-low relative overflow-hidden flex items-center justify-center" style="background: conic-gradient(#7c3aed 0deg 60deg, #13131b 60deg 120deg, #d2bbff 120deg 180deg, #1b1b23 180deg 240deg, #4edea3 240deg 300deg, #34343d 300deg 360deg);">
<!-- Overlay Texture -->
<div class="absolute inset-0 bg-gradient-to-tr from-black/40 via-transparent to-white/10 pointer-events-none"></div>
<!-- Segments Labels (Mockup) -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-full h-[2px] bg-white/5 rotate-[30deg]"></div>
<div class="w-full h-[2px] bg-white/5 rotate-[90deg]"></div>
<div class="w-full h-[2px] bg-white/5 rotate-[150deg]"></div>
</div>
<!-- Center Hub -->
<div class="size-24 rounded-full glass-panel z-10 flex items-center justify-center shadow-2xl border border-white/20">
<svg class="size-10 text-primary" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.1739 20.1739L27.8261 5.82609C29.1366 7.13663 28.3989 10.1876 26.2002 13.7654C24.8538 15.9564 22.9595 18.3449 20.6522 20.6522C18.3449 22.9595 15.9564 24.8538 13.7654 26.2002C10.1876 28.3989 7.13663 29.1366 5.82609 27.8261L20.1739 42.1739C21.4845 43.4845 24.5355 42.7467 28.1133 40.548C30.3042 39.2016 32.6927 37.3073 35 35C37.3073 32.6927 39.2016 30.3042 40.548 28.1133C42.7467 24.5355 43.4845 21.4845 42.1739 20.1739Z" fill="currentColor"></path>
</svg>
</div>
</div>
<!-- Needle/Indicator -->
<div class="absolute -top-4 left-1/2 -translate-x-1/2 z-20">
<div class="w-8 h-12 bg-white rounded-b-xl shadow-lg flex items-end justify-center pb-2">
<div class="size-3 rounded-full bg-primary-container"></div>
</div>
</div>
</div>
<!-- Spin Test Button -->
<button class="absolute bottom-12 px-8 py-4 rounded-2xl glass-panel border border-primary/30 text-white font-display text-lg font-bold hover:bg-primary/20 transition-all flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
                        Test Spin Physics
                    </button>
</div>
</section>
<!-- Right Panel: Asset Browser/Quick Settings -->
<aside class="w-[80px] h-full flex flex-col items-center py-6 bg-surface-container-low border-l border-outline-variant/20 gap-8">
<button class="size-12 rounded-xl flex items-center justify-center text-primary bg-primary/10 border border-primary/30">
<span class="material-symbols-outlined">image</span>
</button>
<button class="size-12 rounded-xl flex items-center justify-center text-outline hover:text-white transition-colors hover:bg-white/5">
<span class="material-symbols-outlined">text_fields</span>
</button>
<button class="size-12 rounded-xl flex items-center justify-center text-outline hover:text-white transition-colors hover:bg-white/5">
<span class="material-symbols-outlined">palette</span>
</button>
<button class="size-12 rounded-xl flex items-center justify-center text-outline hover:text-white transition-colors hover:bg-white/5">
<span class="material-symbols-outlined">auto_fix_high</span>
</button>
<div class="mt-auto">
<button class="size-12 rounded-xl flex items-center justify-center text-outline hover:text-white transition-colors hover:bg-white/5">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</aside>
</main>
</div>
