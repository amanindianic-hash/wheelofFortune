            $ref: '#/components/schemas/UUID'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "204":
          description: Integration deleted.

  # ============================================================================
  # SECTION 8 — ANALYTICS
  # ============================================================================

