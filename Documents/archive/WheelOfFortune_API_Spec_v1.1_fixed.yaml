          application/json:
            schema:
              type: object
              required: [codes]
              properties:
                codes:
                  type: array
                  items:
                    type: string
                    maxLength: 100
                  minItems: 1
                  maxItems: 10000
                  example: ["SUMMER10", "SUMMER11", "SUMMER12"]
      responses:
        "201":
          description: Codes uploaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
                  duplicates_skipped:
                    type: integer
                  available_total:
                    type: integer

  /prizes/{prize_id}/coupons/{id}/redeem:
    post:
      tags: [Coupons]
      summary: Mark a coupon code as redeemed
      description: "Clients call this when an end-user redeems a coupon in their system."
      operationId: redeemCoupon
      security:
        - BearerAuth: []
      parameters:
        - name: prize_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: Coupon marked as redeemed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  coupon:
                    $ref: '#/components/schemas/CouponCode'
        "409":
          description: Coupon is not in 'issued' status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: INVALID_COUPON_STATUS
                  message: "Only issued coupons can be marked as redeemed."
                  details:
                    current_status: "available"

  # ============================================================================
  # SECTION 6 — SPIN (PUBLIC — widget endpoints)
  # ============================================================================

  /spin/session:
    post:
      tags: [Spin]
      summary: Create a spin session (widget load)
      description: |
        Called by the embeddable widget on load. Authenticated via `embed_token` in
        the request body — **no JWT required**. This endpoint is PUBLIC.

        **Rate limit:** 30 requests per minute per `embed_token + IP`.

        Returns the full wheel config so the widget can render without a second request.
      operationId: createSpinSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [embed_token, fingerprint]
              properties:
                embed_token:
                  type: string
                  maxLength: 64
                fingerprint:
                  type: string
                  maxLength: 128
                  description: "SHA-256 hash of browser attributes (TRD Section 5.2)."
                page_url:
                  type: string
                  maxLength: 2000
                  nullable: true
                referrer_url:
                  type: string
                  maxLength: 2000
                  nullable: true
      responses:
        "201":
          description: Session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    $ref: '#/components/schemas/UUID'
                  wheel:
                    allOf:
                      - $ref: '#/components/schemas/Wheel'
                      - type: object
                        properties:
                          segments:
                            type: array
                            items:
                              $ref: '#/components/schemas/Segment'
                  can_spin:
                    type: boolean
                  cannot_spin_reason:
                    type: string
                    nullable: true
                    enum:
                      - ALREADY_SPUN_TODAY
                      - SPIN_CAP_REACHED
                      - WHEEL_INACTIVE
                      - OUTSIDE_DATE_RANGE
                      - MONTHLY_LIMIT_REACHED
        "400":
          description: Invalid or unknown embed_token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: INVALID_EMBED_TOKEN
                  message: "The provided embed_token does not match any active wheel."
                  details: {}
        "429":
          $ref: '#/components/responses/RateLimited'

  /spin/execute:
    post:
      tags: [Spin]
      summary: Execute a spin (PUBLIC)
      description: |
        Executes the spin. The most critical endpoint in the system. **Must be idempotent.**

        Provide a client-generated `idempotency_key` (UUID) with every request.
        If the same key is resent, the original result is returned — no second spin occurs.

        **Rate limit:** 10 requests per minute per `session_id`.

        **Prize Engine** runs synchronously and must complete within 200ms (TRD Section 4).
      operationId: executeSpin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, idempotency_key]
              properties:
                session_id:
                  $ref: '#/components/schemas/UUID'
                idempotency_key:
                  type: string
                  format: uuid
                  maxLength: 128
                  description: "Client-generated UUID. Prevents duplicate spin processing."
                lead:
                  type: object
                  description: "Required if wheel has a lead capture form."
                  properties:
                    email:
                      type: string
                      format: email
                    name:
                      type: string
                    phone:
                      type: string
                      maxLength: 30
                    custom_fields:
                      type: object
                      additionalProperties: true
                    gdpr_consent:
                      type: boolean
      responses:
        "200":
          description: Spin executed. Returns the winning segment and prize.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: '#/components/schemas/SpinResult'
        "403":
          description: Spin not permitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                session_expired:
                  summary: Session expired
                  value:
                    error:
                      code: SESSION_EXPIRED
                      message: "This session has expired. Please reload the page."
                      details: {}
                spin_not_allowed:
                  summary: Spin not allowed
                  value:
                    error:
                      code: SPIN_NOT_ALLOWED
                      message: "This session is not eligible to spin."
                      details: {}
        "409":
          description: Duplicate spin or idempotency conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                already_spun:
                  summary: Session already has a result
                  value:
                    error:
                      code: ALREADY_SPUN
                      message: "This session has already been used to spin. Returning original result."
                      details:
                        existing_result: {}
                duplicate_key:
                  summary: Idempotency key conflict
                  value:
                    error:
                      code: DUPLICATE_IDEMPOTENCY_KEY
                      message: "This idempotency_key was used by a different session."
                      details: {}
        "422":
          description: Lead data required but not provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: LEAD_REQUIRED
                  message: "This wheel requires lead capture before spinning."
                  details:
                    required_fields: ["email"]
        "503":
          description: Prize Engine temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: PRIZE_ENGINE_UNAVAILABLE
                  message: "Prize engine is temporarily unavailable. Retry after 2 seconds."
                  details:
                    retry_after_seconds: 2
        "429":
          $ref: '#/components/responses/RateLimited'

