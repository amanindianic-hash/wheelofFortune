openapi: 3.0.3

info:
  title: Wheel of Fortune Platform API
  version: "1.0"
  description: |
    Complete API specification for the Wheel of Fortune Customization Platform.

    **Authentication**
    - Dashboard endpoints require a Bearer JWT in the `Authorization` header.
    - Widget/public endpoints are authenticated via `embed_token` in the request body.
    - JWT access tokens expire after **15 minutes**. Use `POST /auth/refresh` to renew.

    **Base URL**
    `https://api.spinplatform.io/v1`

    **Standard Error Envelope**
    ```json
    {
      "error": {
        "code": "ERROR_CODE",
        "message": "Human readable description",
        "details": {}
      }
    }
    ```

    **Rate Limit Headers**
    All responses include: `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`

    **Related Documents**
    - WheelOfFortune_TRD_v1.0 — Technical Requirements Document
    - WheelOfFortune_SOP_v1.0 — Standard Operating Procedure
    - WheelOfFortune_Schema_v1.0.sql — PostgreSQL Database Schema
  contact:
    name: Engineering Team
  license:
    name: Confidential — Internal Use Only

servers:
  - url: https://api.spinplatform.io/v1
    description: Production
  - url: https://staging-api.spinplatform.io/v1
    description: Staging
  - url: http://localhost:4000/v1
    description: Local development

tags:
  - name: Auth
    description: Registration, login, token management
  - name: Wheels
    description: Wheel campaign lifecycle management
  - name: Segments
    description: Wheel segment configuration
  - name: Prizes
    description: Prize definition and management
  - name: Coupons
    description: Coupon code pool management
  - name: Spin
    description: Public widget endpoints — session creation and spin execution
  - name: Integrations
    description: Third-party integration configuration
  - name: Analytics
    description: Spin event analytics and reporting
  - name: Account
    description: Client account and team management

# ==============================================================================
# SECURITY SCHEMES
# ==============================================================================

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token (HS256, 15-minute expiry). Obtain from POST /auth/login."

  # ============================================================================
  # REUSABLE SCHEMAS
  # ============================================================================

  schemas:

    # --- Primitives & Shared ---------------------------------------------------

    UUID:
      type: string
      format: uuid
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    HexColor:
      type: string
      pattern: '^#[0-9A-Fa-f]{6}$'
      example: "#1E3A5F"

    Timestamp:
      type: string
      format: date-time
      example: "2026-03-15T12:00:00Z"

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "Human readable description of the error."
            details:
              type: object
              additionalProperties: true
              example: { "field": "email", "issue": "Invalid format" }

    # --- Enums ----------------------------------------------------------------

    ClientPlan:
      type: string
      enum: [starter, growth, pro, enterprise]

    UserRole:
      type: string
      enum: [owner, admin, editor, viewer]

    WheelStatus:
      type: string
      enum: [draft, active, paused, archived]

    PrizeType:
      type: string
      enum: [coupon, points, gift_card, message, url_redirect, try_again]

    CouponMode:
      type: string
      enum: [static, unique_pool, auto_generate]

    CouponStatus:
      type: string
      enum: [available, issued, redeemed, expired, cancelled]

    IntegrationType:
      type: string
      enum: [mailchimp, klaviyo, hubspot, salesforce, zapier, webhook, google_sheets]

    # --- Config Sub-Schemas ---------------------------------------------------

    WheelConfig:
      type: object
      description: "Wheel behaviour configuration. All fields optional — defaults applied by server."
      properties:
        spin_duration_ms:
          type: integer
          minimum: 2000
          maximum: 10000
          default: 4000
          example: 4000
        animation_speed:
          type: string
          enum: [slow, medium, fast, custom]
          default: medium
        pointer_position:
          type: string
          enum: [top, right, bottom, left]
          default: top
        confetti_enabled:
          type: boolean
          default: true
        sound_enabled:
          type: boolean
          default: false
        sound_url:
          type: string
          nullable: true
          description: "S3 URL to audio file. NULL if sound_enabled = false."
        show_segment_labels:
          type: boolean
          default: true
        center_image_url:
          type: string
          nullable: true
          description: "S3 URL for optional center logo image."
        guaranteed_win_every_n:
          type: integer
          nullable: true
          minimum: 1
          description: "Force a win every N spins. NULL = disabled."
        guaranteed_win_segment_id:
          type: string
          format: uuid
          nullable: true
          description: "Segment ID to force-land on for guaranteed wins."

    WheelFormConfig:
      type: object
      description: "Lead capture form shown before the spin. Empty object = no form."
      properties:
        enabled:
          type: boolean
          default: false
        fields:
          type: array
          items:
            type: object
            required: [key, label, type]
            properties:
              key:
                type: string
                description: "Field identifier. Reserved: email, name, phone. Custom keys allowed."
                example: "email"
              label:
                type: string
                example: "Your Email Address"
              type:
                type: string
                enum: [email, text, tel, checkbox]
              required:
                type: boolean
                default: false
        gdpr_enabled:
          type: boolean
          default: false
        gdpr_text:
          type: string
          example: "I agree to receive marketing emails."
        privacy_policy_url:
          type: string
          nullable: true
        terms_url:
          type: string
          nullable: true

    CreatePrizeRequest:
      type: object
      description: "Request body for creating a new prize. Excludes server-set fields (id, client_id, created_at)."
      required: [name, type, display_title]
      properties:
        name:
          type: string
          maxLength: 255
        type:
          $ref: '#/components/schemas/PrizeType'
        display_title:
          type: string
          maxLength: 100
        display_description:
          type: string
          nullable: true
          maxLength: 500
        coupon_mode:
          $ref: '#/components/schemas/CouponMode'
        static_coupon_code:
          type: string
          nullable: true
          maxLength: 100
        auto_gen_prefix:
          type: string
          nullable: true
          maxLength: 20
        auto_gen_length:
          type: integer
          nullable: true
          default: 8
        coupon_expiry_days:
          type: integer
          nullable: true
        points_value:
          type: integer
          nullable: true
        redirect_url:
          type: string
          nullable: true
          maxLength: 2000
        custom_message_html:
          type: string
          nullable: true

    WheelBranding:
      type: object
      description: "Visual branding configuration."
      properties:
        logo_url:
          type: string
          nullable: true
        logo_position:
          type: string
          enum: [above, center]
          default: above
        primary_color:
          $ref: '#/components/schemas/HexColor'
        secondary_color:
          $ref: '#/components/schemas/HexColor'
        background_type:
          type: string
          enum: [solid, gradient, image]
          default: solid
        background_value:
          type: string
          description: "Hex string, CSS gradient, or S3 URL depending on background_type."
          example: "#FFFFFF"
        font_family:
          type: string
          default: Inter
          example: "Inter"
        custom_font_url:
          type: string
          nullable: true
          description: "S3 URL to woff2 font file. Used when font_family = custom."
        button_text:
          type: string
          maxLength: 30
          default: "SPIN NOW!"
        button_color:
          $ref: '#/components/schemas/HexColor'
        border_color:
          $ref: '#/components/schemas/HexColor'
        border_width:
          type: integer
          minimum: 1
          maximum: 20
          default: 4
          description: "Border width in pixels."

    # --- Core Resource Schemas ------------------------------------------------

    Client:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        slug:
          type: string
        email:
          type: string
          format: email
        plan:
          $ref: '#/components/schemas/ClientPlan'
        plan_spin_limit:
          type: integer
        spins_used_this_month:
          type: integer
        billing_cycle_day:
          type: integer
          minimum: 1
          maximum: 28
        custom_domain:
          type: string
          nullable: true
        timezone:
          type: string
          example: "Asia/Kolkata"
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/Timestamp'

    User:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        client_id:
          $ref: '#/components/schemas/UUID'
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        email_verified:
          type: boolean
        last_login_at:
          $ref: '#/components/schemas/Timestamp'
        created_at:
          $ref: '#/components/schemas/Timestamp'

    Wheel:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        client_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        status:
          $ref: '#/components/schemas/WheelStatus'
        config:
          $ref: '#/components/schemas/WheelConfig'
        branding:
          $ref: '#/components/schemas/WheelBranding'
        trigger_rules:
          type: object
          additionalProperties: true
        frequency_rules:
          type: object
          additionalProperties: true
        active_from:
          $ref: '#/components/schemas/Timestamp'
        active_until:
          $ref: '#/components/schemas/Timestamp'
        total_spin_cap:
          type: integer
          nullable: true
        total_spins:
          type: integer
        embed_token:
          type: string
          example: "a3f9c2e1b8d74506..."
        form_config:
          $ref: '#/components/schemas/WheelFormConfig'
        created_at:
          $ref: '#/components/schemas/Timestamp'

    Segment:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        wheel_id:
          $ref: '#/components/schemas/UUID'
        position:
          type: integer
          minimum: 0
        label:
          type: string
          maxLength: 60
        bg_color:
          $ref: '#/components/schemas/HexColor'
        text_color:
          $ref: '#/components/schemas/HexColor'
        icon_url:
          type: string
          nullable: true
        weight:
          type: number
          format: float
          minimum: 0.0001
          maximum: 99999.9999
          default: 1.0
        prize_id:
          type: string
          format: uuid
          nullable: true
        is_no_prize:
          type: boolean
          default: false
        consolation_message:
          type: string
          nullable: true
          maxLength: 255
        win_cap_daily:
          type: integer
          nullable: true
          minimum: 1
        win_cap_total:
          type: integer
          nullable: true
          minimum: 1
        wins_today:
          type: integer
          readOnly: true
        wins_total:
          type: integer
          readOnly: true

    Prize:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        client_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 255
        type:
          $ref: '#/components/schemas/PrizeType'
        display_title:
          type: string
          maxLength: 100
        display_description:
          type: string
          nullable: true
          maxLength: 500
        coupon_mode:
          $ref: '#/components/schemas/CouponMode'
        static_coupon_code:
          type: string
          nullable: true
          maxLength: 100
        auto_gen_prefix:
          type: string
          nullable: true
          maxLength: 20
        auto_gen_length:
          type: integer
          nullable: true
          default: 8
        coupon_expiry_days:
          type: integer
          nullable: true
          description: "Days from win date until coupon expires. NULL = no expiry."
        points_value:
          type: integer
          nullable: true
        redirect_url:
          type: string
          nullable: true
          maxLength: 2000
        custom_message_html:
          type: string
          nullable: true
          description: "Sanitized HTML. Allowed tags: p, b, i, br, a, ul, li."
        created_at:
          $ref: '#/components/schemas/Timestamp'

    CouponCode:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        prize_id:
          $ref: '#/components/schemas/UUID'
        code:
          type: string
        status:
          $ref: '#/components/schemas/CouponStatus'
        issued_to_spin_id:
          type: string
          format: uuid
          nullable: true
        issued_at:
          $ref: '#/components/schemas/Timestamp'
        expires_at:
          $ref: '#/components/schemas/Timestamp'
        redeemed_at:
          $ref: '#/components/schemas/Timestamp'
        created_at:
          $ref: '#/components/schemas/Timestamp'

    SpinSession:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        wheel_id:
          $ref: '#/components/schemas/UUID'
        fingerprint:
          type: string
        status:
          type: string
          enum: [loaded, form_submitted, spun, expired]
        lead_email:
          type: string
          nullable: true
        expires_at:
          $ref: '#/components/schemas/Timestamp'
        created_at:
          $ref: '#/components/schemas/Timestamp'

    SpinResult:
      type: object
      properties:
        spin_result_id:
          $ref: '#/components/schemas/UUID'
        segment:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            label:
              type: string
            position:
              type: integer
        prize:
          type: object
          nullable: true
          properties:
            type:
              $ref: '#/components/schemas/PrizeType'
            display_title:
              type: string
            display_description:
              type: string
              nullable: true
            coupon_code:
              type: string
              nullable: true
            expires_at:
              $ref: '#/components/schemas/Timestamp'
            points_value:
              type: integer
              nullable: true
            redirect_url:
              type: string
              nullable: true
            custom_message_html:
              type: string
              nullable: true
        is_no_prize:
          type: boolean

    Integration:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        wheel_id:
          $ref: '#/components/schemas/UUID'
        type:
          $ref: '#/components/schemas/IntegrationType'
        is_enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true
          description: "Non-secret config (list IDs, field mappings). Credentials excluded from response."
        last_triggered_at:
          $ref: '#/components/schemas/Timestamp'
        last_error:
          type: string
          nullable: true
        created_at:
          $ref: '#/components/schemas/Timestamp'

  # ============================================================================
  # REUSABLE RESPONSES
  # ============================================================================

  responses:
    Unauthorized:
      description: Missing or invalid JWT token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: UNAUTHORIZED
              message: "Bearer token is missing or expired."
              details: {}

    Forbidden:
      description: Authenticated but insufficient role or plan.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    NotFound:
      description: Resource not found or not owned by this client.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: NOT_FOUND
              message: "The requested resource does not exist."
              details: {}

    ValidationError:
      description: Request body failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: VALIDATION_ERROR
              message: "One or more fields are invalid."
              details:
                email: "Must be a valid email address."
                password: "Must contain at least one uppercase letter."

    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
          description: "Seconds until the rate limit window resets."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: TOO_MANY_REQUESTS
              message: "Rate limit exceeded. Please retry after the window resets."
              details: {}

# ==============================================================================
# PATHS
# ==============================================================================

paths:

  # ============================================================================
  # SECTION 1 — AUTH
  # ============================================================================

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new client account
      description: |
        Creates a new client account and owner user in a single operation.
        Returns a JWT access token immediately. A verification email is sent
        to the provided address — the dashboard remains accessible but certain
        features require `email_verified = true`.
      operationId: registerClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company_name, email, password, full_name]
              properties:
                company_name:
                  type: string
                  maxLength: 255
                  example: "Acme Corp"
                email:
                  type: string
                  format: email
                  example: "founder@acme.com"
                password:
                  type: string
                  minLength: 8
                  description: "Min 8 chars, at least 1 uppercase letter and 1 number."
                  example: "SecurePass1"
                full_name:
                  type: string
                  example: "Jane Doe"
      responses:
        "201":
          description: Account created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  client:
                    $ref: '#/components/schemas/Client'
                  user:
                    $ref: '#/components/schemas/User'
                  access_token:
                    type: string
                    description: "JWT (HS256, expires 15 min)."
                  refresh_token:
                    type: string
                    description: "Opaque token (expires 30 days)."
        "409":
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: "This email address is already associated with an account."
                  details: {}
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          description: "Registration rate limit exceeded (3 attempts / 1 hour / IP)."
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and obtain tokens
      description: |
        Validates credentials and returns a JWT access token and opaque refresh token.

        **Rate limit:** 5 failed attempts per IP per 10 minutes triggers a 30-minute lockout.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: "JWT (HS256, expires 15 min)."
                  refresh_token:
                    type: string
                    description: "Opaque token (expires 30 days)."
                  user:
                    $ref: '#/components/schemas/User'
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: INVALID_CREDENTIALS
                  message: "Email or password is incorrect."
                  details: {}
        "403":
          description: Account access denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                email_not_verified:
                  summary: Email not verified
                  value:
                    error:
                      code: EMAIL_NOT_VERIFIED
                      message: "Please verify your email address before logging in."
                      details: {}
                account_suspended:
                  summary: Account suspended
                  value:
                    error:
                      code: ACCOUNT_SUSPENDED
                      message: "This account has been suspended. Contact support."
                      details: {}
        "429":
          description: "Login rate limit — 5 failed attempts in 10 min. Lockout 30 min."
          $ref: '#/components/responses/RateLimited'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: "Exchange a valid refresh token for a new access token and rotated refresh token."
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Tokens refreshed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                    description: "Rotated. Previous refresh token is invalidated."
        "401":
          description: Refresh token invalid or expired.
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate refresh token
      description: "Revokes the provided refresh token. Access tokens remain valid until natural expiry (max 15 min)."
      operationId: logout
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "204":
          description: Logged out successfully. No response body.
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ============================================================================
  # SECTION 2 — WHEELS
  # ============================================================================

  /wheels:
    get:
      tags: [Wheels]
      summary: List all wheels for the authenticated client
      operationId: listWheels
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/WheelStatus'
          description: "Filter by wheel status."
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated list of wheels.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Wheel'
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
        "401":
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Wheels]
      summary: Create a new wheel
      description: |
        Creates a new wheel in `draft` status. Requires `editor` role or above.

        **Plan limits** — maximum active wheels per plan:
        - starter: 1
        - growth: 5
        - pro: 20
        - enterprise: unlimited
      operationId: createWheel
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: "Summer Sale Spinner"
                config:
                  $ref: '#/components/schemas/WheelConfig'
                branding:
                  $ref: '#/components/schemas/WheelBranding'
      responses:
        "201":
          description: Wheel created in draft status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  wheel:
                    $ref: '#/components/schemas/Wheel'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Plan wheel limit reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: PLAN_WHEEL_LIMIT
                  message: "Your plan allows a maximum of 1 active wheel. Upgrade to create more."
                  details:
                    current_plan: "starter"
                    limit: 1
        "422":
          $ref: '#/components/responses/ValidationError'

  /wheels/{id}:
    get:
      tags: [Wheels]
      summary: Get a single wheel
      operationId: getWheel
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: Wheel object with segments included.
          content:
            application/json:
              schema:
                type: object
                properties:
                  wheel:
                    allOf:
                      - $ref: '#/components/schemas/Wheel'
                      - type: object
                        properties:
                          segments:
                            type: array
                            items:
                              $ref: '#/components/schemas/Segment'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Wheels]
      summary: Update wheel config or branding
      description: "Partial update. Only provide fields you wish to change. Requires `editor` role or above."
      operationId: updateWheel
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                config:
                  $ref: '#/components/schemas/WheelConfig'
                branding:
                  $ref: '#/components/schemas/WheelBranding'
                trigger_rules:
                  type: object
                frequency_rules:
                  type: object
                active_from:
                  $ref: '#/components/schemas/Timestamp'
                active_until:
                  $ref: '#/components/schemas/Timestamp'
                total_spin_cap:
                  type: integer
                  nullable: true
                form_config:
                  $ref: '#/components/schemas/WheelFormConfig'
      responses:
        "200":
          description: Updated wheel object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  wheel:
                    $ref: '#/components/schemas/Wheel'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/ValidationError'

  /wheels/{id}/status:
    patch:
      tags: [Wheels]
      summary: Change wheel status
      description: |
        Transitions the wheel through its lifecycle.

        **Allowed transitions:**
        - `draft` → `active`: Validates ≥ 2 segments, ≥ 1 prize segment with valid prize, embed_token present.
        - `active` → `paused`: Immediately stops new sessions. Existing open sessions may complete.
        - `active` → `archived`: Soft-archives. Cannot be reactivated. Spin history preserved.
        - `paused` → `active`: Re-activates.
        - `paused` → `archived`: Soft-archives.

        Requires `admin` role or above.
      operationId: updateWheelStatus
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, paused, archived]
      responses:
        "200":
          description: Status updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  wheel:
                    $ref: '#/components/schemas/Wheel'
        "400":
          description: Invalid status transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: INVALID_STATUS_TRANSITION
                  message: "Cannot transition from 'archived' to 'active'."
                  details: {}
        "422":
          description: Wheel cannot be activated — validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: WHEEL_NOT_READY
                  message: "Wheel requires at least 2 segments and 1 prize segment before activation."
                  details:
                    segment_count: 1
                    prize_segment_count: 0

  # ============================================================================
  # SECTION 3 — SEGMENTS
  # ============================================================================

  /wheels/{wheel_id}/segments:
    get:
      tags: [Segments]
      summary: List segments for a wheel
      operationId: listSegments
      security:
        - BearerAuth: []
      parameters:
        - name: wheel_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: Ordered list of segments.
          content:
            application/json:
              schema:
                type: object
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Segment'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Segments]
      summary: Replace all segments (atomic)
      description: |
        Replaces all segments for the wheel in a single atomic operation.
        **Min 2, max 24 segments.**

        **Validation rules:**
        - `position` values must be 0-indexed consecutive integers starting at 0.
        - Sum of all `weight` values must be > 0.
        - If `is_no_prize = false`, `prize_id` must reference a valid prize owned by the same client.
        - `weight` must be ≥ 0.0001 and ≤ 99999.9999.
        - Hex colors must match `^#[0-9A-Fa-f]{6}$`.

        Requires `editor` role or above.
      operationId: replaceSegments
      security:
        - BearerAuth: []
      parameters:
        - name: wheel_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [segments]
              properties:
                segments:
                  type: array
                  minItems: 2
                  maxItems: 24
                  items:
                    type: object
                    required: [position, label, bg_color, text_color, weight]
                    properties:
                      position:
                        type: integer
                        minimum: 0
                      label:
                        type: string
                        maxLength: 60
                      bg_color:
                        $ref: '#/components/schemas/HexColor'
                      text_color:
                        $ref: '#/components/schemas/HexColor'
                      icon_url:
                        type: string
                        nullable: true
                      weight:
                        type: number
                        minimum: 0.0001
                        maximum: 99999.9999
                      prize_id:
                        type: string
                        format: uuid
                        nullable: true
                      is_no_prize:
                        type: boolean
                        default: false
                      consolation_message:
                        type: string
                        nullable: true
                        maxLength: 255
                      win_cap_daily:
                        type: integer
                        nullable: true
                        minimum: 1
                      win_cap_total:
                        type: integer
                        nullable: true
                        minimum: 1
      responses:
        "200":
          description: Segments replaced successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Segment'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/ValidationError'

  # ============================================================================
  # SECTION 4 — PRIZES
  # ============================================================================

  /prizes:
    get:
      tags: [Prizes]
      summary: List prizes for the authenticated client
      operationId: listPrizes
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/PrizeType'
      responses:
        "200":
          description: List of prizes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Prize'

    post:
      tags: [Prizes]
      summary: Create a prize
      operationId: createPrize
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrizeRequest'
      responses:
        "201":
          description: Prize created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  prize:
                    $ref: '#/components/schemas/Prize'
        "422":
          $ref: '#/components/responses/ValidationError'

  /prizes/{id}:
    get:
      tags: [Prizes]
      summary: Get a prize
      operationId: getPrize
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: Prize object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  prize:
                    $ref: '#/components/schemas/Prize'
        "404":
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Prizes]
      summary: Update a prize
      description: "Partial update. Cannot change `type` after creation."
      operationId: updatePrize
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Prize'
      responses:
        "200":
          description: Updated prize.
          content:
            application/json:
              schema:
                type: object
                properties:
                  prize:
                    $ref: '#/components/schemas/Prize'
        "422":
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Prizes]
      summary: Delete a prize
      description: |
        Hard delete. Blocked if the prize is referenced by any active segment.
      operationId: deletePrize
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "204":
          description: Deleted successfully.
        "409":
          description: Prize is referenced by active segments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: PRIZE_IN_USE
                  message: "Cannot delete this prize — it is referenced by active segments."
                  details:
                    segment_ids: ["uuid-1", "uuid-2"]

  # ============================================================================
  # SECTION 5 — COUPON CODES
  # ============================================================================

  /prizes/{prize_id}/coupons:
    get:
      tags: [Coupons]
      summary: List coupon codes for a prize
      operationId: listCoupons
      security:
        - BearerAuth: []
      parameters:
