                is_enabled:
                  type: boolean
                credentials:
                  type: object
                  additionalProperties: true
                config:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Integration updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  integration:
                    $ref: '#/components/schemas/Integration'

    delete:
      tags: [Integrations]
      summary: Remove an integration
      operationId: deleteIntegration
      security:
        - BearerAuth: []
      parameters:
        - name: wheel_id
          in: path
          required: true
