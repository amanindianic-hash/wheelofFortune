                          type: integer

  # ============================================================================
  # SECTION 9 — ACCOUNT MANAGEMENT
  # ============================================================================

  /account:
    get:
      tags: [Account]
      summary: Get current client account details
      operationId: getAccount
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Client account object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  client:
                    $ref: '#/components/schemas/Client'

    patch:
      tags: [Account]
      summary: Update account settings
      description: "Requires `owner` role."
      operationId: updateAccount
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                timezone:
                  type: string
                custom_domain:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated client object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  client:
                    $ref: '#/components/schemas/Client'

  /account/team:
    get:
      tags: [Account]
      summary: List team members
      operationId: listTeam
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of users on this client account.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

    post:
      tags: [Account]
      summary: Invite a team member
      description: "Sends a verification email with an invite link. Requires `admin` role or above."
      operationId: inviteTeamMember
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, full_name, role]
              properties:
                email:
                  type: string
                  format: email
                full_name:
                  type: string
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        "201":
          description: Invite sent. User created with email_verified = false.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        "409":
          description: Email already exists in this account.

  /account/team/{user_id}:
    patch:
      tags: [Account]
      summary: Update team member role
      description: "Requires `admin` role or above. Cannot demote the sole owner."
      operationId: updateTeamMember
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        "200":
          description: Role updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

    delete:
      tags: [Account]
      summary: Remove a team member
      description: "Soft-deletes the user. Cannot remove the sole owner."
      operationId: removeTeamMember
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "204":
          description: Team member removed.
        "409":
          description: Cannot remove the sole owner of the account.

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address
      description: |
        Verifies a user's email using the token sent in the verification email.
        Sets `email_verified = true` on the user record.
        Token is single-use and expires after 24 hours.
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: "Verification token from the email link."
      responses:
        "200":
          description: Email verified successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        "400":
          description: Token invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: INVALID_VERIFICATION_TOKEN
                  message: "This verification link is invalid or has expired. Request a new one."
                  details: {}
        "409":
          description: Email already verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: ALREADY_VERIFIED
                  message: "This email address has already been verified."
                  details: {}

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend email verification link
      description: "Resends the verification email. Rate-limited to 3 requests per hour per email."
      operationId: resendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "204":
          description: "Verification email sent (or silently ignored if already verified)."
        "429":
          $ref: '#/components/responses/RateLimited'

  # ============================================================================
  # SECTION 10 — GDPR & DATA MANAGEMENT
  # ============================================================================

  /account/data-export:
    post:
      tags: [Account]
      summary: Request a full data export
      description: |
        Triggers a full export of the client's data (wheels, prizes, spin logs, leads).
        The export is compiled asynchronously and emailed to the account owner within 24 hours.
        Requires `owner` role.
      operationId: requestDataExport
      security:
        - BearerAuth: []
      responses:
        "202":
          description: Export request accepted. Email will be sent within 24 hours.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Data export has been queued. You will receive an email within 24 hours."
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "429":
          description: "Data export already requested in last 24 hours."
          $ref: '#/components/responses/RateLimited'

  /account/gdpr/erase-end-user:
    post:
      tags: [Account]
      summary: Erase end-user PII (GDPR Right to Erasure)
      description: |
        Anonymises all personally identifiable information (PII) for an end-user
        identified by their email address across all `spin_sessions`.

        **What is erased:** email, name, phone, custom_fields, ip_address, fingerprint, user_agent, gdpr_consent.

        **What is preserved:** `spin_results` rows (immutable audit trail — prize and segment data only, no PII).

        Requires `owner` or `admin` role. Action is logged in `audit_logs`.
      operationId: eraseEndUserData
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  description: "Email address of the end-user whose data should be erased."
      responses:
        "200":
          description: PII erased successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions_anonymised:
                    type: integer
                    description: "Number of spin_sessions rows where PII was cleared."
                  message:
                    type: string
                    example: "3 session records anonymised. Spin result audit records preserved."
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  # ============================================================================
  # SECTION 11 — ANALYTICS EXPORT
  # ============================================================================

  /wheels/{wheel_id}/analytics/export:
    get:
      tags: [Analytics]
      summary: Export spin log as CSV
      description: |
        Downloads a CSV file of all spin events for the wheel within the date range.

        **Columns:** spin_result_id, timestamp, lead_email, lead_name, segment_label, prize_type, prize_display_title, coupon_code, is_no_prize.

        **Plan restriction:** Available on Growth plan and above.
        **Row limit:** 100,000 rows per export. For larger datasets, use date range filtering.
      operationId: exportWheelAnalytics
      security:
        - BearerAuth: []
      parameters:
        - name: wheel_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-01"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-31"
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
      responses:
        "200":
          description: CSV or JSON file download.
          headers:
            Content-Disposition:
              schema:
                type: string
              example: "attachment; filename=\"spin_export_2026-03-01_2026-03-31.csv\""
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
        "403":
          description: Plan does not include export feature.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: FEATURE_NOT_IN_PLAN
                  message: "CSV export is available on the Growth plan and above."
                  details:
                    current_plan: "starter"
                    required_plan: "growth"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

# ==============================================================================
# GLOBAL SECURITY DEFAULT
# ==============================================================================

security:
  - BearerAuth: []
