                  redeemed_count:
                    type: integer

    post:
      tags: [Coupons]
      summary: Upload coupon codes to a prize pool
      description: |
        Bulk-upload unique coupon codes for prizes with `coupon_mode = unique_pool`.
        Duplicate codes within the same prize are silently ignored.
      operationId: uploadCoupons
      security:
        - BearerAuth: []
      parameters:
        - name: prize_id
          in: path
