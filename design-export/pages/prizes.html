<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpinPlatform - Prizes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #13131b; font-family: 'Inter', sans-serif; color: #e4e1ed; }
    .glass-panel { background: rgba(31, 31, 40, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body class="min-h-full bg-[#13131b]">
  <div class="max-w-4xl mx-auto px-6 md:px-8 py-8 space-y-6">

    <!-- Header -->
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-[26px] font-bold tracking-[-0.03em] text-white">Prizes</h1>
        <p class="text-sm text-muted-foreground mt-0.5">Define prizes that can be assigned to wheel segments</p>
      </div>
      <button class="bg-violet-600 hover:bg-violet-700 text-white gap-1.5 h-9 px-4 rounded-lg flex items-center text-sm font-medium transition-colors">
        <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New Prize
      </button>
    </div>

    <!-- Prize List -->
    <div class="rounded-xl bg-[#1f1f28] border border-white/5 overflow-hidden py-0">
      <div class="divide-y divide-white/5">

        <!-- Prize Row 1 -->
        <div class="group flex items-center justify-between px-5 py-4 hover:bg-white/5 transition-colors duration-150">
          <div class="flex items-center gap-3.5 min-w-0">
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-violet-500/10 text-violet-400">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.41.532l1.086 1.087a2 2 0 01-.266 3.293l-.293.293a2 2 0 01-3.293-.266l-1.086-1.087A2 2 0 013.513 3.66L2.427 4.747 3 6l1.086 1.087a2 2 0 01.266 3.293l-.293.293a2 2 0 01-3.293-.266L.27 8.82A2 2 0 00.5 10.24l1.087 1.086a2 2 0 012.733 1.06l.293.293a2 2 0 003.293-.266l1.086-1.087a2 2 0 011.06-2.734l.293-.293a2 2 0 01.266-3.293l.293-.293a2 2 0 012.734-1.06l1.086 1.086a2 2 0 012.053.54l1.086-1.086a2 2 0 00-.54-2.053l-.293-.293a2 2 0 01-.266-3.293l.293-.293a2 2 0 013.293.266l1.086 1.086a2 2 0 00.54 2.053L20 6l-1.086-1.086a2 2 0 01-.266-3.293l.293-.293a2 2 0 013.293.266l1.086 1.086"/>
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-sm font-semibold text-white truncate leading-none">20% OFF Your Order</p>
              <p class="text-[11px] text-muted-foreground mt-0.5">Summer Discount · coupon · static</p>
            </div>
          </div>
          <button class="h-7 w-7 p-0 text-muted-foreground hover:text-rose-500 hover:bg-rose-500/10 opacity-0 group-hover:opacity-100 transition-all duration-150 flex items-center justify-center rounded-lg">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>

        <!-- Prize Row 2 -->
        <div class="group flex items-center justify-between px-5 py-4 hover:bg-white/5 transition-colors duration-150">
          <div class="flex items-center gap-3.5 min-w-0">
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-amber-500/10 text-amber-400">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-sm font-semibold text-white truncate leading-none">100 Loyalty Points</p>
              <p class="text-[11px] text-muted-foreground mt-0.5">Points Reward · points</p>
            </div>
          </div>
          <button class="h-7 w-7 p-0 text-muted-foreground hover:text-rose-500 hover:bg-rose-500/10 opacity-0 group-hover:opacity-100 transition-all duration-150 flex items-center justify-center rounded-lg">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>

        <!-- Prize Row 3 -->
        <div class="group flex items-center justify-between px-5 py-4 hover:bg-white/5 transition-colors duration-150">
          <div class="flex items-center gap-3.5 min-w-0">
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-blue-500/10 text-blue-400">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-sm font-semibold text-white truncate leading-none">$5 Gift Card</p>
              <p class="text-[11px] text-muted-foreground mt-0.5">Gift Card Prize · gift_card</p>
            </div>
          </div>
          <button class="h-7 w-7 p-0 text-muted-foreground hover:text-rose-500 hover:bg-rose-500/10 opacity-0 group-hover:opacity-100 transition-all duration-150 flex items-center justify-center rounded-lg">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>

        <!-- Prize Row 4 -->
        <div class="group flex items-center justify-between px-5 py-4 hover:bg-white/5 transition-colors duration-150">
          <div class="flex items-center gap-3.5 min-w-0">
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-emerald-500/10 text-emerald-400">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-sm font-semibold text-white truncate leading-none">Free Shipping Coupon</p>
              <p class="text-[11px] text-muted-foreground mt-0.5">Shipping Reward · message</p>
            </div>
          </div>
          <button class="h-7 w-7 p-0 text-muted-foreground hover:text-rose-500 hover:bg-rose-500/10 opacity-0 group-hover:opacity-100 transition-all duration-150 flex items-center justify-center rounded-lg">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>

      </div>
    </div>

  </div>
</body>
</html>
