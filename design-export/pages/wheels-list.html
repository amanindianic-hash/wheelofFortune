<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpinPlatform - Campaigns</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --color-primary: #d2bbff;
      --color-primary-container: #7c3aed;
      --color-tertiary: #4edea3;
      --color-background: #13131b;
      --color-on-surface: #e4e1ed;
    }
    body { background: #13131b; font-family: var(--font-body); color: #e4e1ed; }
    .font-heading { font-family: var(--font-heading); }
    .glass-panel { background: rgba(41, 41, 50, 0.6); backdrop-filter: blur(24px); }
    .bg-dot-pattern { background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 24px 24px; }
  </style>
</head>
<body class="min-h-screen bg-[#13131b]">
  <!-- Ambient background -->
  <div class="pointer-events-none absolute inset-x-0 top-0 h-[400px] z-0" style="background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(124,58,237,0.08) 0%, transparent 70%)"></div>

  <div class="relative z-10 p-6 md:p-8 max-w-5xl mx-auto space-y-8">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h1 class="text-[32px] md:text-[40px] font-bold tracking-[-0.04em] leading-tight text-white font-heading">
          Campaigns
        </h1>
        <p class="text-[14px] text-muted-foreground/60 font-medium mt-1">
          Design and manage your interactive spin-to-win experiences
        </p>
      </div>
      <button class="gap-2 h-10 px-5 text-[13px] font-bold tracking-tight text-white border-0 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]" style="background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); box-shadow: 0 0 25px rgba(124,58,237,0.3), inset 0 1px 0 0 rgba(255,255,255,0.2);">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New Campaign
      </button>
    </div>

    <!-- Campaign Cards -->
    <div class="grid gap-3">

      <!-- Campaign 1 - Active -->
      <div class="group relative flex items-center justify-between pl-6 pr-5 py-5 glass-panel rounded-2xl hover:bg-white/[0.03] transition-all duration-300">
        <div class="flex items-center gap-5 min-w-0">
          <!-- Visual Marker -->
          <div class="relative shrink-0">
            <div class="absolute inset-0 blur-lg bg-[#d2bbff]/10 rounded-full group-hover:bg-[#d2bbff]/20 transition-colors"></div>
            <div class="relative flex h-11 w-11 items-center justify-center rounded-[14px] bg-white/[0.03] ring-1 ring-white/10 shadow-lg group-hover:scale-110 transition-transform duration-500">
              <svg class="h-5 w-5 text-muted-foreground/60 transition-colors group-hover:text-[#d2bbff] animate-[spin_8s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path stroke-width="2" d="M12 2v10l4 4"/>
              </svg>
            </div>
          </div>

          <div class="min-w-0">
            <p class="text-[15px] font-bold text-white leading-[1.2] truncate tracking-tight mb-1">Summer Sale Wheel</p>
            <div class="flex items-center gap-3">
              <!-- Status Pill -->
              <div class="px-2 py-0.5 rounded-full ring-1 items-center gap-1.5 flex transition-all duration-300 bg-emerald-500/10 ring-emerald-500/20 text-emerald-400">
                <span class="h-1 w-1 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="text-[10px] font-bold uppercase tracking-[0.05em]">Active</span>
              </div>

              <span class="text-muted-foreground/20 text-[10px] tabular-nums font-bold">·</span>

              <div class="flex items-center gap-1.5">
                <span class="text-[11px] font-bold text-muted-foreground/50 tabular-nums">12,847</span>
                <span class="text-[10px] font-bold text-muted-foreground/30 uppercase tracking-widest">Spins</span>
              </div>

              <span class="text-muted-foreground/20 text-[10px] tabular-nums font-bold hidden sm:inline">·</span>

              <div class="hidden sm:flex items-center gap-1.5">
                <span class="text-[10px] font-mono font-bold text-muted-foreground/30 uppercase tracking-widest">Token:</span>
                <span class="text-[10px] font-mono font-medium text-muted-foreground/40">abc12345</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-2 shrink-0">
          <button class="h-8 pr-4 pl-3.5 text-[11px] font-bold tracking-tight rounded-lg glass-panel hover:bg-white/[0.04] border-0 ring-1 ring-white/10 hidden sm:flex">
            <svg class="h-3 w-3 mr-2 text-[#d2bbff]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
            Edit
          </button>

          <button class="h-8 w-8 p-0 rounded-lg hover:bg-white/[0.05] transition-colors">
            <svg class="h-4 w-4 text-muted-foreground/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Campaign 2 - Paused -->
      <div class="group relative flex items-center justify-between pl-6 pr-5 py-5 glass-panel rounded-2xl hover:bg-white/[0.03] transition-all duration-300">
        <div class="flex items-center gap-5 min-w-0">
          <div class="relative shrink-0">
            <div class="absolute inset-0 blur-lg bg-[#d2bbff]/10 rounded-full group-hover:bg-[#d2bbff]/20 transition-colors"></div>
            <div class="relative flex h-11 w-11 items-center justify-center rounded-[14px] bg-white/[0.03] ring-1 ring-white/10 shadow-lg group-hover:scale-110 transition-transform duration-500">
              <svg class="h-5 w-5 text-muted-foreground/60 transition-colors group-hover:text-[#d2bbff]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path stroke-width="2" d="M12 2v10l4 4"/>
              </svg>
            </div>
          </div>

          <div class="min-w-0">
            <p class="text-[15px] font-bold text-white leading-[1.2] truncate tracking-tight mb-1">Q4 Promo Spin</p>
            <div class="flex items-center gap-3">
              <div class="px-2 py-0.5 rounded-full ring-1 items-center gap-1.5 flex transition-all duration-300 bg-amber-500/10 ring-amber-500/20 text-amber-400">
                <span class="h-1 w-1 rounded-full bg-amber-400"></span>
                <span class="text-[10px] font-bold uppercase tracking-[0.05em]">Paused</span>
              </div>

              <span class="text-muted-foreground/20 text-[10px] tabular-nums font-bold">·</span>

              <div class="flex items-center gap-1.5">
                <span class="text-[11px] font-bold text-muted-foreground/50 tabular-nums">8,234</span>
                <span class="text-[10px] font-bold text-muted-foreground/30 uppercase tracking-widest">Spins</span>
              </div>

              <span class="text-muted-foreground/20 text-[10px] tabular-nums font-bold hidden sm:inline">·</span>

              <div class="hidden sm:flex items-center gap-1.5">
                <span class="text-[10px] font-mono font-bold text-muted-foreground/30 uppercase tracking-widest">Token:</span>
                <span class="text-[10px] font-mono font-medium text-muted-foreground/40">def67890</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-2 shrink-0">
          <button class="h-8 pr-4 pl-3.5 text-[11px] font-bold tracking-tight rounded-lg glass-panel hover:bg-white/[0.04] border-0 ring-1 ring-white/10 hidden sm:flex">
            <svg class="h-3 w-3 mr-2 text-[#d2bbff]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
            Edit
          </button>

          <button class="h-8 w-8 p-0 rounded-lg hover:bg-white/[0.05] transition-colors">
            <svg class="h-4 w-4 text-muted-foreground/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Campaign 3 - Draft -->
      <div class="group relative flex items-center justify-between pl-6 pr-5 py-5 glass-panel rounded-2xl hover:bg-white/[0.03] transition-all duration-300 opacity-60">
        <div class="flex items-center gap-5 min-w-0">
          <div class="relative shrink-0">
            <div class="absolute inset-0 blur-lg bg-[#d2bbff]/10 rounded-full group-hover:bg-[#d2bbff]/20 transition-colors"></div>
            <div class="relative flex h-11 w-11 items-center justify-center rounded-[14px] bg-white/[0.03] ring-1 ring-white/10 shadow-lg group-hover:scale-110 transition-transform duration-500">
              <svg class="h-5 w-5 text-muted-foreground/60 transition-colors group-hover:text-[#d2bbff]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path stroke-width="2" d="M12 2v10l4 4"/>
              </svg>
            </div>
          </div>

          <div class="min-w-0">
            <p class="text-[15px] font-bold text-white leading-[1.2] truncate tracking-tight mb-1">Newsletter Signup</p>
            <div class="flex items-center gap-3">
              <div class="px-2 py-0.5 rounded-full ring-1 items-center gap-1.5 flex transition-all duration-300 bg-slate-500/10 ring-slate-500/20 text-slate-400">
                <span class="h-1 w-1 rounded-full bg-slate-400"></span>
                <span class="text-[10px] font-bold uppercase tracking-[0.05em]">Draft</span>
              </div>

              <span class="text-muted-foreground/20 text-[10px] tabular-nums font-bold">·</span>

              <div class="flex items-center gap-1.5">
                <span class="text-[11px] font-bold text-muted-foreground/50 tabular-nums">0</span>
                <span class="text-[10px] font-bold text-muted-foreground/30 uppercase tracking-widest">Spins</span>
              </div>

              <span class="text-muted-foreground/20 text-[10px] tabular-nums font-bold hidden sm:inline">·</span>

              <div class="hidden sm:flex items-center gap-1.5">
                <span class="text-[10px] font-mono font-bold text-muted-foreground/30 uppercase tracking-widest">Token:</span>
                <span class="text-[10px] font-mono font-medium text-muted-foreground/40">ghi11111</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-2 shrink-0">
          <button class="h-8 pr-4 pl-3.5 text-[11px] font-bold tracking-tight rounded-lg glass-panel hover:bg-white/[0.04] border-0 ring-1 ring-white/10 hidden sm:flex">
            <svg class="h-3 w-3 mr-2 text-[#d2bbff]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
            Edit
          </button>

          <button class="h-8 w-8 p-0 rounded-lg hover:bg-white/[0.05] transition-colors">
            <svg class="h-4 w-4 text-muted-foreground/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
