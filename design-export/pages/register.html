<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpinPlatform - Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #13131b; font-family: 'Inter', sans-serif; color: #e4e1ed; }
    .glass-panel { background: rgba(31, 31, 40, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#13131b] p-4 relative">
  <!-- Back link -->
  <a href="/" class="absolute top-6 left-6 flex items-center gap-2 text-sm font-medium text-muted-foreground hover:text-white transition-colors group z-50">
    <svg class="h-4 w-4 transition-transform group-hover:-translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
    </svg>
    Back to Home
  </a>

  <div class="w-full max-w-md shadow-xl glass-panel rounded-2xl">
    <!-- Header -->
    <div class="text-center space-y-2 pt-8 pb-6">
      <a href="/" class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-violet-600 shadow-[0_0_0_1px_rgba(124,58,237,0.3),0_8px_24px_-4px_rgba(124,58,237,0.5)] mb-2 hover:scale-105 transition-transform inline-flex">
        <svg viewBox="0 0 24 24" class="h-7 w-7 text-white" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 2v10l4 4" />
          <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none" />
        </svg>
      </a>
      <h2 class="text-2xl font-bold text-white">Create your account</h2>
      <p class="text-sm text-muted-foreground">Start building spin-to-win campaigns in minutes</p>
    </div>

    <div class="px-6 pb-6 space-y-4">
      <!-- Google Sign-Up -->
      <button class="w-full gap-2.5 h-10 font-medium flex items-center justify-center rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 transition-colors text-white">
        <svg viewBox="0 0 24 24" class="h-4 w-4" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </button>

      <!-- Divider -->
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <span class="w-full border-t border-white/10"></span>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-[#1f1f28] px-2 text-muted-foreground">or sign up with email</span>
        </div>
      </div>

      <!-- Form -->
      <form class="space-y-4">
        <div class="space-y-1.5">
          <label for="company_name" class="text-xs font-medium text-white/70">Company Name</label>
          <input type="text" id="company_name" placeholder="Acme Corp" required
            class="h-10 w-full rounded-lg border border-white/10 bg-white/5 px-3 text-white placeholder:text-white/30 focus:border-violet-500 focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition-colors">
        </div>
        <div class="space-y-1.5">
          <label for="full_name" class="text-xs font-medium text-white/70">Your Name</label>
          <input type="text" id="full_name" placeholder="Jane Smith" required
            class="h-10 w-full rounded-lg border border-white/10 bg-white/5 px-3 text-white placeholder:text-white/30 focus:border-violet-500 focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition-colors">
        </div>
        <div class="space-y-1.5">
          <label for="email" class="text-xs font-medium text-white/70">Email</label>
          <input type="email" id="email" placeholder="you@company.com" required
            class="h-10 w-full rounded-lg border border-white/10 bg-white/5 px-3 text-white placeholder:text-white/30 focus:border-violet-500 focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition-colors">
        </div>
        <div class="space-y-1.5">
          <label for="password" class="text-xs font-medium text-white/70">Password</label>
          <div class="relative">
            <input type="password" id="password" placeholder="Min. 8 characters" required
              class="h-10 w-full rounded-lg border border-white/10 bg-white/5 px-3 pr-10 text-white placeholder:text-white/30 focus:border-violet-500 focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition-colors">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
      </form>
    </div>

    <div class="flex flex-col gap-3 px-6 pb-8 pt-0">
      <button class="w-full h-10 bg-violet-600 hover:bg-violet-700 text-white font-semibold rounded-lg shadow-[0_0_0_1px_rgba(124,58,237,0.4),0_4px_12px_-2px_rgba(124,58,237,0.35)] transition-all">
        Create Account
      </button>
      <p class="text-sm text-muted-foreground text-center">
        Already have an account? <a href="/login" class="text-violet-600 hover:underline font-medium">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
